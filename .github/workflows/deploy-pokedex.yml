# .github/workflows/deploy-pokedex.yml
#
# Build the pokedex-app and deploy it to GitHub Pages.
#
# Deployment URL: https://guolunhao.github.io/pokedex/
#
# Prerequisites:
#   1. Go to repo Settings → Pages → Source: "GitHub Actions"
#   2. Done — no token needed, GITHUB_TOKEN handles it automatically.

name: Deploy Pokedex to GitHub Pages

on:
  # Trigger on pushes to main branch that change pokedex-app/ or data/
  push:
    branches: [ main ]
    paths:
      - 'pokedex-app/**'
      - 'data/**'
  # Allow manual trigger
  workflow_dispatch:

# Allow one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

# GITHUB_TOKEN permission for deploying to gh-pages branch
permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./pokedex-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: pokedex-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Prepare static data (copy from ../data/)
        run: node scripts/prepare-data.js

      - name: Build
        run: npm run build-only
        env:
          NODE_ENV: production

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          # Built-in token — no PAT needed
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # Publish the build output
          publish_dir: ./pokedex-app/dist
          # Keep only the latest deployment
          keep_files: false
